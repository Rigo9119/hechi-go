services:
  db:
    image: postgres:17-alpine
    container_name: hechi-db
    environment:
      POSTGRES_DB: hechi
      POSTGRES_USER: hechi
      POSTGRES_PASSWORD: hechi
    ports:
      - "5432:5432"
    volumes:
      - hechi_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hechi -d hechi"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  hechi_db_data:
